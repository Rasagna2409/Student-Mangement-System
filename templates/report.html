<!DOCTYPE html>
<html>
<head>
    <title>Student Report</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Student Report</h1>

<nav>
    <a href="/">Students</a> |
    <a href="/dashboard">Dashboard</a>
</nav>

<table>
<tr>
    <th>Name</th>
    <th>Course</th>
    <th>Marks</th>
    <th>Grade</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[3]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
